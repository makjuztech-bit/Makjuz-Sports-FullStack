services:
  # Backend Service
  - type: web
    name: arenabuild-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://makjuz-sports-full-stack.vercel.app/

  # Frontend Service (Static Site)
  - type: web
    name: arenabuild-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
      - key: VITE_API_URL
        value: https://arenabuild-backend.onrender.com/api
